version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: 'weekly'
    # Version updates disabled — Renovatebot handles regular upgrades.
    # open-pull-requests-limit: 0 disables version update PRs while keeping
    # Dependabot security alerts/PRs active (controlled in repo Settings).
    open-pull-requests-limit: 0

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(ci)'
    open-pull-requests-limit: 5
